  <section class="book_section layout_padding">
    <div class="container">
      <div class="heading_container heading_center">
        <h2>Đăng ký tài khoản</h2>
      </div>
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="form_container">
            <div id="formMessage" class="alert d-none" role="alert" aria-live="polite"></div>
            <form id="registerForm" data-redirect="./login.html">
              <div>
                <input type="text" class="form-control" name="username" placeholder="Tên người dùng" required />
              </div>
              <div>
                <input type="email" class="form-control" name="email" placeholder="Email" required />
              </div>
              <div>
                <input type="password" class="form-control" name="password" placeholder="Mật khẩu" required />
              </div>
              <div>
                <input type="text" class="form-control" name="phone" placeholder="Số điện thoại" required />
              </div>
              <div>
                <input type="text" class="form-control" name="address" placeholder="Địa chỉ" required />
              </div>
              <div class="btn_box">
                <button type="submit">Đăng ký</button>
              </div>
              <div class="text-center mt-3">
                <a href="./login.html">Đã có tài khoản? Đăng nhập</a>
              </div>
            </form>
          </div>
        </div>
      </div>
