<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Hàng - ReBike Market</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header-top {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header-top h1 {
            font-size: 32px;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .order-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Product Card */
        .product-summary {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            position: sticky;
            top: 20px;
            height: fit-content;
        }

        .product-summary h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .product-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .product-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 8px;
        }

        .product-info {
            flex: 1;
        }

        .product-info h3 {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .product-info p {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .product-price {
            font-size: 16px;
            font-weight: 700;
            color: #e74c3c;
        }

        .divider {
            height: 1px;
            background: #e0e0e0;
            margin: 15px 0;
        }

        .total-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-top: 2px solid #667eea;
            border-bottom: 2px solid #667eea;
        }

        .total-section .label {
            font-weight: 600;
            color: #333;
        }

        .total-section .amount {
            font-size: 20px;
            font-weight: 700;
            color: #667eea;
        }

        /* Form Section */
        .form-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .form-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .textarea-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .payment-method {
            margin-bottom: 20px;
        }

        .payment-option {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .payment-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .payment-option input[type="radio"] {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }

        .payment-option label {
            margin: 0;
            cursor: pointer;
            flex: 1;
            font-weight: 500;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #333;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .alert-info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #1565c0;
        }

        @media (max-width: 768px) {
            .order-wrapper {
                grid-template-columns: 1fr;
            }

            .product-summary {
                position: relative;
                top: 0;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .header-top h1 {
                font-size: 24px;
            }
        }

        .success-icon {
            font-size: 20px;
        }

        .required {
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <h1>🛒 Hoàn Tất Đơn Hàng</h1>
            <p>Kiểm tra thông tin và hoàn tất thanh toán</p>
        </div>

        <div class="order-wrapper">
            <!-- Product Summary (Right) -->
            <div class="product-summary">
                <h2><span class="success-icon">📦</span> Sản Phẩm Của Bạn</h2>
                
                <div id="cartItems"></div>

                <div class="divider"></div>

                <div class="total-section">
                    <span class="label">Tổng Tiền:</span>
                    <span class="amount" id="totalAmount">0 VNĐ</span>
                </div>

                <div style="margin-top: 15px; padding: 12px; background: #fff3cd; border-radius: 8px; font-size: 12px; color: #856404; border-left: 4px solid #ffc107;">
                    <strong>💡 Ghi chú:</strong> Vui lòng kiểm tra thông tin trước khi xác nhận đặt hàng
                </div>
            </div>

            <!-- Order Form (Left) -->
            <div class="form-section">
                <form id="orderForm">
                    <div class="alert-info">
                        ℹ️ Tất cả các trường có dấu <span class="required">*</span> là bắt buộc
                    </div>

                    <!-- Section 1: Thông Tin Cá Nhân -->
                    <h3 style="color: #667eea; margin: 20px 0 15px 0; font-size: 16px;">👤 Thông Tin Cá Nhân</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Họ và Tên <span class="required">*</span></label>
                            <input type="text" id="fullName" placeholder="VD: Nguyễn Văn A" required>
                        </div>
                        <div class="form-group">
                            <label>Email <span class="required">*</span></label>
                            <input type="email" id="email" placeholder="VD: email@example.com" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Số Điện Thoại <span class="required">*</span></label>
                            <input type="tel" id="phone" placeholder="VD: 0987654321" pattern="[0-9]{10}" required>
                        </div>
                        <div class="form-group">
                            <label>Ngày Sinh</label>
                            <input type="date" id="birthDate">
                        </div>
                    </div>

                    <!-- Section 2: Địa Chỉ Giao Hàng -->
                    <h3 style="color: #667eea; margin: 20px 0 15px 0; font-size: 16px;">🏠 Địa Chỉ Giao Hàng</h3>

                    <div class="form-group">
                        <label>Địa Chỉ <span class="required">*</span></label>
                        <input type="text" id="address" placeholder="VD: 123 Đường Trần Hưng Đạo" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Thành Phố / Tỉnh <span class="required">*</span></label>
                            <select id="province" required>
                                <option value="">-- Chọn Thành Phố --</option>
                                <option value="Hà Nội">Hà Nội</option>
                                <option value="Hồ Chí Minh">Hồ Chí Minh</option>
                                <option value="Đà Nẵng">Đà Nẵng</option>
                                <option value="Hải Phòng">Hải Phòng</option>
                                <option value="Cần Thơ">Cần Thơ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Mã Bưu Chính <span class="required">*</span></label>
                            <input type="text" id="postCode" placeholder="VD: 100000" required>
                        </div>
                    </div>

                    <!-- Section 3: Phương Thức Thanh Toán -->
                    <h3 style="color: #667eea; margin: 20px 0 15px 0; font-size: 16px;">💳 Phương Thức Thanh Toán</h3>

                    <div class="payment-method">
                        <div class="payment-option">
                            <input type="radio" id="payment1" name="payment" value="COD" checked>
                            <label for="payment1">💵 Thanh toán khi nhận hàng (COD)</label>
                        </div>
                        <div class="payment-option">
                            <input type="radio" id="payment2" name="payment" value="BANK">
                            <label for="payment2">🏦 Chuyển khoản ngân hàng</label>
                        </div>
                        <div class="payment-option">
                            <input type="radio" id="payment3" name="payment" value="ONLINE">
                            <label for="payment3">💳 Thẻ tín dụng / Ví điện tử</label>
                        </div>
                    </div>

                    <!-- Note -->
                    <div class="form-group textarea-group">
                        <label>Ghi Chú Đơn Hàng (Tuỳ Chọn)</label>
                        <textarea id="notes" placeholder="VD: Giao hàng vào buổi sáng, chọn hàng cẩn thận..."></textarea>
                    </div>

                    <!-- Buttons -->
                    <div class="button-group">
                        <button type="button" class="btn btn-cancel" onclick="goBack()">❌ Hủy</button>
                        <button type="submit" class="btn btn-submit">✅ Xác Nhận Đặt Hàng</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/script.js"></script>
    <script>
        // Biến toàn cục lưu trữ sản phẩm được chọn (hoàn toàn độc lập với giỏ hàng)
        let selectedProduct = null;
        let selectedProductQuantity = 1;

        // Lấy productId từ URL query parameter
        function getProductIdFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const productIdStr = urlParams.get('productId');
            return productIdStr ? parseInt(productIdStr) : null;
        }

        // Hiển thị sản phẩm được chọn từ URL (không lấy từ giỏ hàng)
        function loadOrderPage() {
            const cartItemsDiv = document.getElementById('cartItems');
            const totalAmountSpan = document.getElementById('totalAmount');
            
            // Kiểm tra xem có productId từ URL không
            const productId = getProductIdFromURL();
            
            if (!productId) {
                // Nếu không có productId, hiển thị lỗi
                cartItemsDiv.innerHTML = '<p style="color: #e74c3c; text-align: center; font-weight: 600;">❌ Vui lòng chọn sản phẩm để tiếp tục</p>';
                totalAmountSpan.textContent = '0 VNĐ';
                document.querySelector('.btn-submit').disabled = true;
                document.querySelector('.btn-submit').style.opacity = '0.5';
                return;
            }
            
            // Hiển thị sản phẩm được chọn từ URL
            selectedProduct = products.find(p => p.id === productId);
            
            if (!selectedProduct) {
                // Nếu không tìm thấy sản phẩm
                cartItemsDiv.innerHTML = '<p style="color: #e74c3c; text-align: center; font-weight: 600;">❌ Sản phẩm không tồn tại</p>';
                totalAmountSpan.textContent = '0 VNĐ';
                document.querySelector('.btn-submit').disabled = true;
                document.querySelector('.btn-submit').style.opacity = '0.5';
                return;
            }
            
            // Hiển thị sản phẩm
            const itemTotal = selectedProduct.price * selectedProductQuantity;
            
            const html = `
                <div class="product-item">
                    <img src="${selectedProduct.img}" alt="${selectedProduct.name}">
                    <div class="product-info">
                        <h3>${selectedProduct.name}</h3>
                        <p><strong>Giá:</strong> ${selectedProduct.price.toLocaleString('vi-VN')} VNĐ</p>
                        <p><strong>Số lượng:</strong> <input type="number" id="quantityInput" value="${selectedProductQuantity}" min="1" max="10" style="width: 50px; padding: 5px; border: 1px solid #ddd; border-radius: 4px;" onchange="updateQuantity()"></p>
                        <p class="product-price">Tổng: ${itemTotal.toLocaleString('vi-VN')} VNĐ</p>
                    </div>
                </div>
            `;
            
            cartItemsDiv.innerHTML = html;
            totalAmountSpan.textContent = itemTotal.toLocaleString('vi-VN') + ' VNĐ';
        }

        // Cập nhật số lượng sản phẩm
        function updateQuantity() {
            const quantityInput = document.getElementById('quantityInput');
            if (quantityInput) {
                selectedProductQuantity = parseInt(quantityInput.value) || 1;
                loadOrderPage();
            }
        }

        // Xử lý form submission
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const productId = getProductIdFromURL();
            
            if (!productId || !selectedProduct) {
                alert('❌ Lỗi: Vui lòng chọn sản phẩm');
                return;
            }

            // Tạo đơn hàng với sản phẩm được chọn (không liên kết tới giỏ hàng)
            const items = [{
                id: selectedProduct.id,
                name: selectedProduct.name,
                price: selectedProduct.price,
                img: selectedProduct.img,
                quantity: selectedProductQuantity
            }];

            const formData = {
                fullName: document.getElementById('fullName').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                birthDate: document.getElementById('birthDate').value,
                address: document.getElementById('address').value,
                province: document.getElementById('province').value,
                postCode: document.getElementById('postCode').value,
                paymentMethod: document.querySelector('input[name="payment"]:checked').value,
                notes: document.getElementById('notes').value,
                orderDate: new Date().toLocaleString('vi-VN'),
                items: items
            };

            // Lưu đơn hàng vào localStorage (riêng, không xóa giỏ hàng)
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            orders.push(formData);
            localStorage.setItem('orders', JSON.stringify(orders));

            // Thông báo thành công
            alert('✅ Đặt hàng thành công!\n\nChúng tôi sẽ liên hệ bạn trong 24 giờ.\nCảm ơn bạn đã mua hàng!');
            
            // Quay lại trang chủ
            window.location.href = './index.html';
        });

        // Quay lại
        function goBack() {
            if (confirm('Bạn có chắc muốn hủy bỏ đơn hàng này?')) {
                window.history.back();
            }
        }

        // Load page on start - Chờ products array có sẵn
        function waitForProducts() {
            if (typeof products !== 'undefined' && products.length > 0) {
                console.log('✅ Products loaded:', products.length, 'products');
                setTimeout(() => {
                    loadOrderPage();
                }, 50);
            } else {
                console.log('⏳ Waiting for products...');
                setTimeout(waitForProducts, 50);
            }
        }

        // Load khi DOM ready hoặc sau khi script.js load
        window.addEventListener('load', function() {
            console.log('Window load event fired');
            waitForProducts();
        });
    </script>
</body>
</html>
