<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <meta
      name="keywords"
      content="chi tiet xe dap, review xe dap, yeu thich xe dap"
    />
    <meta
      name="description"
      content="Trang chi tiết sản phẩm xe đạp thể thao cũ."
    />
    <meta name="author" content="Bike Marketplace" />
    <link
      rel="shortcut icon"
      href="../assets/images/favicon.png"
      type="image/png"
    />
    <title>Chi tiết sản phẩm - Bike Marketplace</title>
    <link rel="stylesheet" type="text/css" href="../assets/css/bootstrap.css" />
    <link href="../assets/css/font-awesome.min.css" rel="stylesheet" />
    <link href="../assets/css/style.css" rel="stylesheet" />
    <link href="../assets/css/responsive.css" rel="stylesheet" />
  </head>

  <body class="sub_page">
    <div class="hero_area">
      <div class="bg-box">
        <img src="../assets/images/hero-bg.webp" alt="" />
      </div>
      <header class="header_section">
        <div class="container">
          <nav class="navbar navbar-expand-lg custom_nav-container">
            <a class="navbar-brand" href="./index.html">
              <span>Bike Marketplace</span>
            </a>
            <button
              class="navbar-toggler"
              type="button"
              data-toggle="collapse"
              data-target="#navbarSupportedContent"
              aria-controls="navbarSupportedContent"
              aria-expanded="false"
              aria-label="Mở menu điều hướng"
            >
              <span class=""></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarSupportedContent">
              <ul class="navbar-nav mx-auto">
                <li class="nav-item">
                  <a class="nav-link" href="./index.html">Trang chủ</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./create_product.html">Đăng bán</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="./favorites.html">Yêu thích</a>
                </li>
              </ul>
              <div class="user_option">
                <a href="./login.html" class="user_link" aria-label="Tài khoản">
                  <svg
                    viewBox="0 0 24 24"
                    width="18"
                    height="18"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="12" cy="7" r="4"></circle>
                    <path d="M20 21a8 8 0 0 0-16 0"></path>
                  </svg>
                </a>
              </div>
            </div>
          </nav>
        </div>
      </header>
    </div>

    <section class="layout_padding">
      <div class="container">
        <div id="productDetailMessage" class="alert d-none" role="alert"></div>

        <div class="row">
          <div class="col-lg-6">
            <div class="shadow p-3 bg-white rounded">
              <img
                id="productDetailImage"
                src="../assets/images/f1.png"
                class="img-fluid w-100 rounded"
                alt="Ảnh sản phẩm"
              />
            </div>
          </div>
          <div class="col-lg-6">
            <div class="shadow p-4 bg-white rounded h-100">
              <h3 id="productDetailName">Chi tiết sản phẩm</h3>
              <p class="mb-2"><b>Giá:</b> <span id="productDetailPrice">-</span></p>
              <p class="mb-2"><b>Loại:</b> <span id="productDetailCategory">-</span></p>
              <p class="mb-2"><b>Số lượng:</b> <span id="productDetailQuantity">-</span></p>
              <p class="mb-2"><b>Trạng thái:</b> <span id="productDetailStatus">-</span></p>
              <p class="mb-2"><b>Người bán:</b> <span id="productDetailSeller">-</span></p>
              <p class="mb-3">
                <b>Mô tả:</b><br />
                <span id="productDetailDescription">-</span>
              </p>

              <div class="d-flex flex-wrap">
                <button
                  id="favoriteToggleButton"
                  type="button"
                  class="btn btn-warning mr-2 mb-2"
                >
                  <i class="fa fa-heart mr-1" aria-hidden="true"></i>
                  <span id="favoriteToggleLabel">Thêm yêu thích</span>
                </button>
                <a href="./favorites.html" class="btn btn-outline-dark mb-2">
                  Xem danh sách yêu thích
                </a>
              </div>
            </div>
          </div>
        </div>

        <div class="row mt-4">
          <div class="col-12">
            <div class="shadow p-4 bg-white rounded">
              <h4 class="mb-3">Đánh giá sản phẩm</h4>
              <div id="reviewsLoading" class="text-muted">Đang tải đánh giá...</div>
              <div id="reviewsEmpty" class="text-muted d-none">
                Chưa có đánh giá cho sản phẩm này.
              </div>
              <div id="reviewsList"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer class="footer_section">
      <div class="container">
        <div class="footer-info">
          <p>
            &copy; <span id="displayYear"></span> Bike Marketplace. All Rights
            Reserved.
          </p>
        </div>
      </div>
    </footer>

    <script src="../assets/js/jquery-3.4.1.min.js"></script>
    <script src="../assets/js/bootstrap.js"></script>
    <script src="../assets/js/custom.js"></script>
    <script src="../assets/js/api-client.js"></script>
    <script src="../assets/js/product-detail.js"></script>
  </body>
</html>
