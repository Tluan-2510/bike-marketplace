version: '3.8'

services:
  # PHP Application
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bike_market_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - bike_market_network
    depends_on:
      - db

  # Nginx Web Server
  web:
    image: nginx:stable-alpine
    container_name: bike_market_web
    restart: unless-stopped
    ports:
      - "8888:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bike_market_network
    depends_on:
      - app

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: bike_market_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: bike_db
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    networks:
      - bike_market_network

networks:
  bike_market_network:
    driver: bridge

volumes:
  db_data: